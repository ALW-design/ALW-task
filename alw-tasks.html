function loadTasks(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):[]}catch{return[]}}
function saveTasks(t){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(t))}catch{}}
let _id=Date.now();
const uid=()=>`t_${_id++}`;
function formatDate(iso){if(!iso)return"";return new Date(iso+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
function daysUntil(iso){if(!iso)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(iso+"T00:00:00")-t)/86400000)}

function DueBadge({iso}){
  if(!iso)return null;
  const d=daysUntil(iso);
  let color="#4a7a4a",label=`Due ${formatDate(iso)}`;
  if(d<0){color="#9a3a2a";label=`Overdue ${Math.abs(d)}d`}
  else if(d===0){color="#8a6000";label="Due Today"}
  else if(d<=3){color="#8a6000";label=`Due in ${d}d`}
  return <span style={{fontSize:11,color,fontFamily:"monospace",marginLeft:6}}>{label}</span>;
}

async function callClaude(prompt){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    if(!res.ok)throw new Error();
    const data=await res.json();
    const text=data.content?.find(b=>b.type==="text")?.text||"";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch{return null}
}

Task: "${task.title}" | Priority: ${task.priority} | Status: ${task.status}
${task.notes?`Notes: ${task.notes}`:""}${task.due?` | Due: ${task.due}`:""}
Return ONLY valid JSON: {"summary":"one sentence","nextSteps":["step 1","step 2","step 3","step 4"],"watchOut":"key risk","estimatedHours":number}`;
      const data=await callClaude(prompt);
      setResult(data||{summary:`Coordinate and execute: ${task.title}`,nextSteps:["Confirm scope and materials needed","Assign responsible party and checkpoint","Execute primary work and document progress","Review and close out task"],watchOut:"Verify all dependencies before starting",estimatedHours:3});

function BatchImportPanel({onClose,onImport}){
  const [text,setText]=useState("");
  const [loading,setLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const todayISO=new Date().toISOString().slice(0,10);
  const tomorrowISO=new Date(Date.now()+86400000).toISOString().slice(0,10);
  const nextWeekISO=new Date(Date.now()+7*86400000).toISOString().slice(0,10);
  function nextWeekday(name){const days=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];const idx=days.indexOf(name.toLowerCase());if(idx<0)return"";const d=new Date();d.setHours(0,0,0,0);const diff=(idx-d.getDay()+7)%7||7;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
  async function parse(){
    if(!text.trim())return;
    setLoading(true);setPreview(null);
    const prompt=`Parse the following into individual tasks for Architectural Leather Works (ALW).
For each task return: title (short), priority ("Critical"/"High"/"Normal"/"Low"), status ("To Do"), due (YYYY-MM-DD or ""), notes (extra context or "").
Date references: today=${todayISO}, tomorrow=${tomorrowISO}, next week=${nextWeekISO}, friday=${nextWeekday("friday")}, monday=${nextWeekday("monday")}, thursday=${nextWeekday("thursday")}.
Return ONLY a JSON array, no markdown: [{"title":"","priority":"","status":"To Do","due":"","notes":""}]
Text: "${text}"`;
    const data=await callClaude(prompt);
    if(data&&Array.isArray(data)){setPreview(data);}
    else{const lines=text.split(/[.!?\n]+/).map(s=>s.trim()).filter(s=>s.length>8);setPreview(lines.slice(0,5).map(line=>({title:line.slice(0,60),priority:"Normal",status:"To Do",due:"",notes:""})));}
    setLoading(false);
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(60,40,20,0.45)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fdf8f0",border:"1.5px solid #c4a882",borderRadius:14,width:"100%",maxWidth:540,maxHeight:"85vh",overflowY:"auto",padding:28,position:"relative",boxShadow:"0 8px 40px rgba(100,60,20,0.18)"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"none",border:"none",color:"#9a8a7a",fontSize:20,cursor:"pointer"}}>✕</button>
        <div style={{fontSize:10,color:"#8b5e3c",letterSpacing:3,marginBottom:4}}>BATCH IMPORT</div>
        <div style={{fontSize:14,color:"#2a1a0a",fontWeight:500,marginBottom:6}}>Dictate or paste tasks</div>
        <div style={{fontSize:11,color:"#9a8a7a",marginBottom:16,lineHeight:1.7}}>Brain-dump multiple tasks at once. Claude parses them into individual cards.</div>
        {!preview&&(<>
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={5}
            placeholder={'e.g. "Call freight company about 767 Fifth shipment, critical, due Friday. Order leather samples for Chicago, high priority next week."'}
            style={{width:"100%",background:"#fff",border:"1.5px solid #d4c4b0",color:"#2a1a0a",borderRadius:8,padding:"10px 12px",fontSize:12,resize:"vertical",marginBottom:14,boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={parse} disabled={!text.trim()||loading} style={{background:text.trim()&&!loading?"#8b5e3c":"#d4c4b0",border:"none",color:"#fdf8f0",borderRadius:7,padding:"9px 20px",cursor:text.trim()&&!loading?"pointer":"default",fontSize:12,letterSpacing:1}}>{loading?"◌ Parsing...":"PARSE TASKS"}</button>
            <button onClick={onClose} style={{background:"none",border:"1.5px solid #d4c4b0",color:"#9a8a7a",borderRadius:7,padding:"9px 14px",cursor:"pointer",fontSize:12}}>CANCEL</button>
          </div>
        </>)}
        {preview&&(<>
          <div style={{fontSize:10,color:"#4a7a4a",letterSpacing:2,marginBottom:12}}>✓ {preview.length} TASKS READY</div>
          {preview.map((t,i)=>(
            <div key={i} style={{background:"white",border:`1.5px solid ${PC[t.priority]?.border||"#d4c4b0"}`,borderRadius:9,padding:"10px 14px",marginBottom:8}}>
              <div style={{fontSize:13,color:"#2a1a0a",fontWeight:500,marginBottom:4}}>{t.title}</div>
              <div style={{display:"flex",gap:12,fontSize:11,color:"#9a8a7a",flexWrap:"wrap"}}>
                <span style={{color:PC[t.priority]?.text}}>{t.priority}</span>
                {t.due&&<span>Due {formatDate(t.due)}</span>}
                {t.notes&&<span style={{color:"#b0a090",fontStyle:"italic"}}>{t.notes}</span>}
              </div>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={()=>{onImport(preview.map(t=>({...t,id:uid(),subtasks:[]})));onClose();}} style={{background:"#8b5e3c",border:"none",color:"#fdf8f0",borderRadius:7,padding:"9px 20px",cursor:"pointer",fontSize:12,letterSpacing:1}}>ADD {preview.length} TASKS</button>
            <button onClick={()=>setPreview(null)} style={{background:"none",border:"1.5px solid #d4c4b0",color:"#9a8a7a",borderRadius:7,padding:"9px 14px",cursor:"pointer",fontSize:12}}>← EDIT</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>form.title.trim()&&onSave(form)} style={{background:"#8b5e3c",border:"none",color:"#fdf8f0",borderRadius:7,padding:"8px 18px",cursor:"pointer",fontSize:12,letterSpacing:1}}>SAVE</button>

      </div>
    </div>
  );

      </span>
      {open&&(
        <div style={{position:"absolute",top:"110%",right:0,background:"#fdf8f0",border:"1.5px solid #c4a882",borderRadius:8,boxShadow:"0 4px 16px rgba(100,60,20,0.15)",zIndex:100,overflow:"hidden",minWidth:90}}>
          {PRIORITIES.map(p=>(
            <div key={p} onClick={()=>{onUpdate({...task,priority:p});setOpen(false);}} style={{padding:"7px 12px",fontSize:11,fontFamily:"monospace",color:PC[p].text,background:task.priority===p?PC[p].bg:"white",cursor:"pointer",borderBottom:"1px solid #f0e8dc"}}>
              {p}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TaskCard({task,onUpdate,onDelete,onAI}){
  const [expanded,setExpanded]=useState(false);
  const [editing,setEditing]=useState(false);
  const pc=PC[task.priority];
  const done=task.status==="Done";
  if(editing)return <TaskForm initial={task} onSave={t=>{onUpdate({...task,...t});setEditing(false);}} onCancel={()=>setEditing(false)}/>;
  return(
    <div style={{background:done?"#f5f2ec":pc.bg,border:`1.5px solid ${done?"#d4c9b8":pc.border}`,borderRadius:11,marginBottom:10,overflow:"visible",boxShadow:done?"none":"0 2px 10px rgba(100,60,20,0.07)"}}>
      <div onClick={()=>setExpanded(e=>!e)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={e=>{e.stopPropagation();onUpdate({...task,status:"Done"});}} title="Mark done" style={{width:22,height:22,borderRadius:"50%",flexShrink:0,background:done?"#e8f0e8":"white",border:`2px solid ${SC[task.status]}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {done?<span style={{color:"#4a7a4a",fontSize:11,fontWeight:700}}>✓</span>:<span style={{color:"#b0a090",fontSize:14}}>○</span>}
        </button>
        <span style={{flex:1,fontSize:14,color:done?"#a09080":"#2a1a0a",textDecoration:done?"line-through":"none",fontWeight:done?400:500}}>{task.title}</span>
        {!done&&<PriorityPicker task={task} onUpdate={onUpdate}/>}
        <span style={{fontSize:10,color:SC[task.status],fontFamily:"monospace",flexShrink:0}}>{task.status}</span>
        <DueBadge iso={task.due}/>
        <span style={{color:"#c4a882",fontSize:11,flexShrink:0}}>{expanded?"▲":"▼"}</span>
      </div>
      {expanded&&(
        <div style={{padding:"0 16px 14px",borderTop:`1px solid ${pc.border}`}}>
          {task.notes&&<div style={{fontSize:12,color:"#7a6a5a",marginTop:10,lineHeight:1.7,fontFamily:"monospace"}}>{task.notes}</div>}
          {task.subtasks?.length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:10,color:"#b0a090",letterSpacing:2,marginBottom:6}}>SUBTASKS</div>
              {task.subtasks.map((s,i)=>{
                const sub=[...(task.subtasks||[])];
                return(<div key={i} onClick={()=>{sub[i]={...sub[i],done:!sub[i].done};onUpdate({...task,subtasks:sub});}} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:6,fontSize:12,fontFamily:"monospace",color:s.done?"#b0a090":"#3a2a1a",textDecoration:s.done?"line-through":"none"}}>
                  <span style={{color:s.done?"#4a7a4a":"#c4a882"}}>{s.done?"✓":"○"}</span>{s.text}
                </div>);
              })}
            </div>
          )}
          <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
            <button onClick={()=>onAI(task)} style={{background:"#8b5e3c",border:"none",color:"#fdf8f0",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:11,fontFamily:"monospace",letterSpacing:1}}>⚡ AI ASSIST</button>
            {done&&<button onClick={()=>onUpdate({...task,status:"To Do"})} style={{background:"none",border:"1.5px solid #c4a882",color:"#8b5e3c",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>↩ REOPEN</button>}
            <button onClick={()=>setEditing(true)} style={{background:"none",border:"1.5px solid #d4c4b0",color:"#7a6a5a",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>EDIT</button>
            <button onClick={()=>onDelete(task.id)} style={{background:"none",border:"1.5px solid #e0c4b8",color:"#c07060",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:11,fontFamily:"monospace"}}>DEL</button>
          </div>
        </div>
      )}
    </div>
  );
}

function NotifBell({tasks}){
  const [perm,setPerm]=useState(()=>{try{return Notification?.permission||"default"}catch{return"default"}});
  async function enable(){
    try{
      if(!("Notification"in window))return;
      const r=await Notification.requestPermission();
      setPerm(r);
      if(r==="granted"){
        tasks.filter(t=>t.due&&t.status!=="Done").forEach(t=>{
          const d=daysUntil(t.due);
          if(d===0)new Notification("ALW — Due Today",{body:t.title,tag:t.id});
          if(d===1){const fire=new Date(t.due+"T08:00:00");const delay=fire-Date.now();if(delay>0)setTimeout(()=>new Notification("ALW — Due Tomorrow",{body:t.title,tag:t.id}),delay);}
        });
      }
    }catch{}
  }
  const on=perm==="granted",denied=perm==="denied";
  return(
    <button onClick={on||denied?undefined:enable} style={{background:"white",border:`1.5px solid ${on?"#4a7a4a":denied?"#d4c4b0":"#c4a882"}`,color:on?"#4a7a4a":denied?"#b0a090":"#8b5e3c",borderRadius:7,padding:"5px 12px",cursor:on||denied?"default":"pointer",fontSize:10,display:"flex",alignItems:"center",gap:5,letterSpacing:1}}>
      <span>{on?"🔔":"🔕"}</span><span>{on?"REMINDERS ON":"REMINDERS"}</span>
    </button>
  );
}

function App(){
  const [tasks,setTasks]=useState(()=>loadTasks());
  const [adding,setAdding]=useState(false);
  const [importing,setImporting]=useState(false);
  const [aiTarget,setAiTarget]=useState(null);
  const [filter,setFilter]=useState("Active");
  const [toast,setToast]=useState("");
  useEffect(()=>{saveTasks(tasks);},[tasks]);
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}
  function addTask(f){setTasks(p=>[...p,{id:uid(),subtasks:[],...f}]);setAdding(false);}
  function importTasks(arr){setTasks(p=>[...p,...arr]);showToast(`✓ ${arr.length} task${arr.length>1?"s":""} imported`);}
  function updateTask(u){setTasks(t=>t.map(x=>x.id===u.id?u:x));}
  function deleteTask(id){setTasks(t=>t.filter(x=>x.id!==id));}
  function applySteps(task,steps){updateTask({...task,subtasks:[...(task.subtasks||[]),...steps.map(s=>({text:s,done:false}))]});}
  const PRIORITY_ORDER={"Critical":0,"High":1,"Normal":2,"Low":3};
  const filtered=(filter==="All"?tasks:filter==="Active"?tasks.filter(t=>t.status!=="Done"):tasks.filter(t=>t.status===filter))
    .slice().sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]);
  const counts={total:tasks.length,done:tasks.filter(t=>t.status==="Done").length,blocked:tasks.filter(t=>t.status==="Blocked").length};
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#fdf6ec 0%,#f5ede0 100%)",padding:"24px 18px",maxWidth:680,margin:"0 auto"}}>
      {toast&&<div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:"#2a1a0a",color:"#fdf8f0",borderRadius:8,padding:"10px 22px",fontSize:13,fontFamily:"monospace",zIndex:9999,animation:"toastin 0.2s ease",whiteSpace:"nowrap"}}>{toast}</div>}
      <div style={{marginBottom:22}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src={LOGO_URL} alt="ALW" style={{height:50,width:"auto",objectFit:"contain"}}/>
          <div style={{marginLeft:4}}>
            <div style={{fontSize:20,color:"#2a1a0a",fontWeight:600,letterSpacing:-0.5}}>Task Board</div>
          </div>
          <div style={{marginLeft:"auto"}}><NotifBell tasks={tasks}/></div>
        </div>
        <div style={{display:"flex",gap:16,marginTop:10,paddingLeft:4}}>
          {[{l:"tasks",v:counts.total,c:"#7a6a5a"},{l:"done",v:counts.done,c:"#4a7a4a"},{l:"blocked",v:counts.blocked,c:"#9a3a2a"}].map(s=>(
            <div key={s.l} style={{fontSize:12}}><span style={{color:s.c,fontWeight:600}}>{s.v}</span><span style={{color:"#b0a090"}}> {s.l}</span></div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {["Active","All","To Do","In Progress","Blocked","Done"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"#8b5e3c":"white",border:`1.5px solid ${filter===f?"#8b5e3c":"#d4c4b0"}`,color:filter===f?"#fdf8f0":"#7a6a5a",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:10,letterSpacing:1}}>{f.toUpperCase()}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={()=>setImporting(true)} style={{background:"white",border:"1.5px solid #c4a882",color:"#8b5e3c",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:10,letterSpacing:1}}>⚡ IMPORT</button>
          <button onClick={()=>setAdding(true)} style={{background:"#8b5e3c",border:"1.5px solid #8b5e3c",color:"#fdf8f0",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:10,letterSpacing:1}}>+ NEW</button>
        </div>
      </div>
      {adding&&<TaskForm onSave={addTask} onCancel={()=>setAdding(false)}/>}
      {filtered.length===0&&!adding&&(
        <div style={{color:"#c4b4a4",fontSize:13,textAlign:"center",marginTop:50,lineHeight:2.2}}>No tasks here.<br/><span style={{fontSize:11}}>Tap + NEW or ⚡ IMPORT to get started.</span></div>
      )}
      {filtered.map(task=>(
        <div key={task.id} className="te">
          <TaskCard task={task} onUpdate={updateTask} onDelete={deleteTask} onAI={setAiTarget}/>
        </div>
      ))}
      {aiTarget&&<AIPanel task={aiTarget} onClose={()=>setAiTarget(null)} onApplySteps={steps=>{applySteps(aiTarget,steps);setAiTarget(null);}}/>}
      {importing&&<BatchImportPanel onClose={()=>setImporting(false)} onImport={importTasks}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("app"));
root.render(<App/>);
</script>
</body>
</html>
